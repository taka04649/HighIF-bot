# .github/workflows/highimpact_bot.yml
name: High Impact GI Bot

on:
  schedule:
    # 週3回: 月・水・金 JST 07:47
    - cron: "47 22 * * 0,2,4"  # UTC 22:47 = JST 07:47 (月・水・金)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          HIGHIMPACT_WEBHOOK_URL: ${{ secrets.HIGHIMPACT_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python highimpact_bot.py

      - name: Save notified PMIDs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notified_highimpact_pmids.json || true
          git diff --staged --quiet || git commit -m "Update notified high-impact PMIDs [skip ci]"
          git push || true
